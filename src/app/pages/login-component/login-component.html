<div class="m-5">
    <form class="row g-3 align-items-end">
        <div class="col-auto">
            <label for="teacher_id" class="form-label">Teacher ID</label>
            <input type="text" class="form-control" id="teacher_id" placeholder="Teacher ID"
                [(ngModel)]="loginData.teacherId" name="teacher_id">
        </div>
        <div class="col-auto">
            <label for="teacher_password" class="form-label">Password</label>
            <input type="password" class="form-control" id="teacher_password" placeholder="Password"
                [(ngModel)]="loginData.password" name="teacher_password">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary" (click)="login()">Login</button>
        </div>
    </form>
</div>
